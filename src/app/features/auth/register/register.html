<div class="register-container">
    <div class="register-card">

        <div class="header">
            <h2>Create Account</h2>
            <p>Register to get started</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

            <div class="row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="Enter first name" formControlName="firstName">
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Enter last name" formControlName="lastName">
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter email" formControlName="email">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter phone number" formControlName="phoneNumber">
            </div>

            <div class="form-group">
                <label>Password</label>

                <div class="password-wrapper">
                    <input [type]="showPassword ? 'text' : 'password'" placeholder="Enter your password"
                        formControlName="password">

                    <button type="button" class="eye-btn" (click)="togglePassword()">

                        <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'">
                        </i>

                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>

                <div class="password-wrapper">
                    <input [type]="showPassword ? 'text' : 'password'" placeholder="Confirm password"
                        formControlName="confirmPassword">

                    <button type="button" class="eye-btn" (click)="togglePassword()">

                        <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'">
                        </i>

                    </button>
                </div>
            </div>

            <button type="submit" class="submit-btn" [disabled]="isSubmitting">
                Create Account
            </button>

            <div class="divider">
                <span>OR</span>
            </div>

            <button type="button" class="google-btn" (click)="googleLogin()">

                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google">

                Continue with Google
            </button>

            <div class="login-link" (click)="goToLogin()">
                Already have an account?
                <a >Login</a>
            </div>

        </form>

    </div>
</div>
