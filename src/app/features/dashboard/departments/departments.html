<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h2>Departments</h2>
      <span class="dept-count" *ngIf="departments.length > 0">{{ departments.length }}</span>
    </div>
    <button class="btn-primary" (click)="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Department
    </button>
  </div>

  <!-- Table -->
  <div class="table-wrapper" *ngIf="departments.length > 0">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Description</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let department of departments; let i = index">
          <td class="col-index">{{ i + 1 }}</td>
          <td class="col-name">
           
            {{ department.name }}
          </td>
          <td class="col-desc">{{ department.description || '—' }}</td>
          <td class="col-status">
            <span class="status-badge" [ngClass]="department.isActive ? 'status-active' : 'status-inactive'">
              <span class="status-dot"></span>
              {{ department.isActive ? 'Active' : 'Inactive' }}
            </span>
          </td>
          <td class="col-actions">
            <button class="btn-delete" (click)="deleteDepartment(department)" title="Delete department">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4h6v2"/>
              </svg>
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="departments.length === 0 && !loading">
    <div class="empty-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <p class="empty-title">No departments yet</p>
    <p class="empty-sub">Get started by creating your first department.</p>
    <button class="btn-primary" (click)="openModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Department
    </button>
  </div>

</div>

<!-- Modal Backdrop -->
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div class="modal-title">
        <div class="modal-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <h3>Add Department</h3>
      </div>
      <button class="close-btn" (click)="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <form [formGroup]="departmentForm" (ngSubmit)="submit()">

      <div class="modal-body">
        <div class="form-group">
          <label for="dept-name">Name <span class="required">*</span></label>
          <input
            id="dept-name"
            type="text"
            formControlName="name"
            placeholder="e.g. Engineering, Support…"
          />
        </div>

        <div class="form-group">
          <label for="dept-desc">Description</label>
          <textarea
            id="dept-desc"
            rows="4"
            formControlName="description"
            placeholder="Brief description of this department…">
          </textarea>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" (click)="closeModal()">
          Cancel
        </button>
        <button
          type="submit"
          class="btn-primary"
          [disabled]="departmentForm.invalid || isSubmitting">
          <svg *ngIf="!isSubmitting" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span class="spinner-sm" *ngIf="isSubmitting"></span>
          {{ isSubmitting ? 'Creating…' : 'Create Department' }}
        </button>
      </div>

    </form>
  </div>
</div>
