<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h2>SLA Policies</h2>
      <span class="dept-count" *ngIf="slas.length > 0">{{ slas.length }}</span>
    </div>
    <button class="btn-primary" (click)="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add SLA
    </button>
  </div>

  <!-- Table -->
  <div class="table-wrapper" *ngIf="slas.length > 0">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <!-- <th>Priority</th> -->
          <th>Response</th>
          <th>Resolution</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let sla of slas; let i = index">
          <td class="col-index">{{ i + 1 }}</td>
          <td class="col-name">
            {{ sla.name }}
          </td>
          
          <td class="col-time">
            <span class="time-chip">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              {{ sla.responseMinutes }} min
            </span>
          </td>
          <td class="col-time">
            <span class="time-chip">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              {{ sla.resolutionMinutes }} min
            </span>
          </td>
          <!-- <td class="col-time">
            <span class="time-chip time-chip-warn">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
              {{ sla.escalationMinutes }} min
            </span>
          </td> -->
          <!-- <td class="col-status">
            <span class="status-badge" [ngClass]="sla.active ? 'status-active' : 'status-inactive'">
              <span class="status-dot"></span>
              {{ sla.active ? 'Active' : 'Inactive' }}
            </span>
          </td> -->
          
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="slas.length === 0 && !loading">
    <div class="empty-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <p class="empty-title">No SLA policies yet</p>
    <p class="empty-sub">Define response and resolution targets for your support team.</p>
    <button class="btn-primary" (click)="openModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add SLA
    </button>
  </div>

</div>

<!-- Modal Backdrop -->
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div class="modal-title">
        <div class="modal-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <h3>Create SLA Policy</h3>
      </div>
      <button class="close-btn" (click)="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <form [formGroup]="slaForm" (ngSubmit)="submit()">
      <div class="modal-body">

        <!-- Row 1: Name + Priority -->
        <div class="form-row">
          <div class="form-group">
            <label for="sla-name">Name <span class="required">*</span></label>
            <input id="sla-name" type="text" formControlName="name" placeholder="e.g. Gold SLA, Standard…" />
          </div>
          <div class="form-group">
            <label for="sla-priority">Priority Level <span class="required">*</span></label>
            <select id="sla-priority" formControlName="priorityLevel">
              <option value="" disabled selected>Select priority</option>
              <option value="LOW">Low</option>
              <option value="MEDIUM">Medium</option>
              <option value="HIGH">High</option>
              <option value="CRITICAL">Critical</option>
            </select>
          </div>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label for="sla-desc">Description</label>
          <textarea id="sla-desc" rows="3" formControlName="description" placeholder="Brief description of this SLA policy…"></textarea>
        </div>

        <!-- Row 2: Minutes grid -->
        <div class="form-row three-col">
          <div class="form-group">
            <label for="sla-response">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              Response (min)
            </label>
            <input id="sla-response" type="number" formControlName="responseMinutes" placeholder="e.g. 30" min="1" />
          </div>
          <div class="form-group">
            <label for="sla-resolution">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              Resolution (min)
            </label>
            <input id="sla-resolution" type="number" formControlName="resolutionMinutes" placeholder="e.g. 240" min="1" />
          </div>
          <div class="form-group">
            <label for="sla-escalation">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="2">
                <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
              Escalation (min)
            </label>
            <input id="sla-escalation" type="number" formControlName="escalationMinutes" placeholder="e.g. 120" min="1" />
          </div>
        </div>

        <!-- Checkboxes -->
        <div class="checkbox-row">
          <label class="checkbox-label">
            <input type="checkbox" formControlName="escalationEnabled" />
            <span class="checkbox-custom"></span>
            Escalation Enabled
          </label>
          <label class="checkbox-label">
            <input type="checkbox" formControlName="active" />
            <span class="checkbox-custom"></span>
            Active
          </label>
        </div>

      </div>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" (click)="closeModal()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="slaForm.invalid || isSubmitting">
          <svg *ngIf="!isSubmitting" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span class="spinner-sm" *ngIf="isSubmitting"></span>
          {{ isSubmitting ? 'Creating…' : 'Create SLA' }}
        </button>
      </div>
    </form>

  </div>
</div>
